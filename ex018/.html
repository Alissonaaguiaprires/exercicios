<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f3f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-container {
      background: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Cadastro</h2>
    <form id="cadastroForm">
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="senha" placeholder="Senha (mínimo 6 caracteres)" required>
      <button type="submit" id="btnCadastrar" disabled>Cadastrar</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('cadastroForm');
    const nome = document.getElementById('nome');
    const email = document.getElementById('email');
    const senha = document.getElementById('senha');
    const btn = document.getElementById('btnCadastrar');

    function validar() {
      if (nome.value.length > 0 && email.value.includes('@') && senha.value.length >= 6) {
        btn.disabled = false;
      } else {
        btn.disabled = true;
      }
    }

    form.addEventListener('input', validar);

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      alert(`Usuário ${nome.value} cadastrado com sucesso!`);
    });
  </script>
</body>
</html>
